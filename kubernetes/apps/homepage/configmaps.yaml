apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: Homelab Dashboard
    theme: dark
    background: https://images.unsplash.com/photo-1506318137071-a8e063b4b611?auto=format&fit=crop&w=1920&q=80
    cardBlur: sm
    headerStyle: boxed
    showDockerStats: false
    search:
      provider: google
      focus: true
      target: _blank
  bookmarks.yaml: |
    - Infrastructure:
        - Proxmox:
            - icon: proxmox
              href: https://192.168.1.10:8006
        - Tailscale Admin:
            - icon: tailscale
              href: https://login.tailscale.com/admin/machines
        - Github Repo:
            - icon: github
              href: https://github.com/melihsavdert/homelab
  services.yaml: |
    - Infrastructure:
        - ArgoCD:
            icon: argo-cd
            href: https://argocd.tail70417b.ts.net
            description: GitOps Continuous Delivery
        - Tailscale:
            icon: tailscale
            href: https://login.tailscale.com
            description: Zero Trust Networking
        - Hubble:
            icon: cilium
            href: https://hubble.tail70417b.ts.net
            description: Network Observability
        - Proxmox:
            icon: proxmox
            href: https://pve:8006/
            description: Hypervisor Management
    - Applications:
        - Hello World:
            icon: nginx
            href: https://hello.tail70417b.ts.net
            description: Test Application
  widgets.yaml: |
    - datetime:
        text_size: xl
        format:
          timeStyle: short
          dateStyle: long
          hour12: false
    - resources:
        cpu: true
        memory: true
        label: Cluster Resources
    - weather:
        location: Istanbul, TR
        units: metric
        cache: 15
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "Nodes Status"
  kubernetes.yaml: |
    mode: cluster
  docker.yaml: ""
  custom.css: ""
  custom.js: ""
  proxmox.yaml: ""
