apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  settings.yaml: |
    title: Homelab Dashboard
    theme: dark
    layout:
      Infrastructure:
        style: list
        columns: 3
      Services:
        style: list
        columns: 3
    headerStyle: boxed
    showDockerStats: false
  bookmarks.yaml: |
    - Infrastructure:
        - Proxmox:
            - icon: proxmox
              href: https://192.168.1.10:8006 # Placeholder, update as needed
        - Tailscale Admin:
            - icon: tailscale
              href: https://login.tailscale.com/admin/machines
        - Github Repo:
            - icon: github
              href: https://github.com/melihsavdert/homelab # Based on username
  services.yaml: |
    - Infrastructure:
        - ArgoCD:
            icon: argo-cd
            href: https://argocd.tail70417b.ts.net
            description: GitOps Continuous Delivery
        - Tailscale:
            icon: tailscale
            href: https://login.tailscale.com
            description: Zero Trust Networking
        - Hubble:
            icon: cilium
            href: https://hubble.tail70417b.ts.net
            description: Network Observability
        - Proxmox:
            icon: proxmox
            href: https://pve:8006/
            description: Hypervisor Management
    - Applications:
        - Hello World:
            icon: nginx
            href: https://hello.tail70417b.ts.net
            description: Test Application
  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - datetime:
        text_size: xl
        format:
          timeStyle: short
          dateStyle: long
          hour12: false
  kubernetes.yaml: |
    mode: cluster
  docker.yaml: ""
  custom.css: ""
  custom.js: ""
  proxmox.yaml: ""
