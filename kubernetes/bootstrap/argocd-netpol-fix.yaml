apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: argocd-internal-allow
  namespace: argocd
spec:
  podSelector: {} # Selects all pods in the argocd namespace
  ingress:
  - from:
    - podSelector: {} # Allows traffic from all pods in the same namespace
  policyTypes:
  - Ingress
