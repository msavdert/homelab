apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  - namespace.yaml
  # Official ArgoCD manifests (v3.4.1 - Latest Stable as of May 2026)
  - https://raw.githubusercontent.com/argoproj/argo-cd/v3.4.1/manifests/install.yaml

# Overrides for Best Practices
patches:
  - target:
      kind: ConfigMap
      name: argocd-cm
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: argocd-cm
      data:
        # Enable status badges for your Git repos
        statusbadge.enabled: "true"
        # Admin UI settings
        admin.enabled: "true"
  
  - target:
      kind: ConfigMap
      name: argocd-cmd-params-cm
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: argocd-cmd-params-cm
      data:
        # Allow connecting via HTTP (since we are using port-forward/internal for now)
        server.insecure: "true"
