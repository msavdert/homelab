apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd

resources:
  - namespace.yaml
  # Using the latest version as requested
  - https://raw.githubusercontent.com/argoproj/argo-cd/v3.4.1/manifests/install.yaml
  - root-application.yaml
  # Best Practice: NetworkPolicy fix for internal ArgoCD communication on Cilium/Talos
  - argocd-netpol-fix.yaml
  # Expose ArgoCD over Tailscale tailnet
  - argocd-ingress.yaml

# Enable Helm support for Kustomize globally in ArgoCD
patches:
  - target:
      kind: ConfigMap
      name: argocd-cm
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: argocd-cm
      data:
        kustomize.buildOptions: --enable-helm
        # Modern GitOps: Enable Server-Side Diff for more accurate state comparison
        resource.server-side-diff: "true"
        # Best Practice: Application Health Check customization.
        # This forces parent apps to wait for children to be fully healthy before moving to next wave.
        resource.customizations.health.argoproj.io_Application: |
          hs = {}
          hs.status = "Progressing"
          hs.message = ""
          if obj.status ~= nil then
            if obj.status.health ~= nil then
              hs.status = obj.status.health.status
              if obj.status.health.message ~= nil then
                hs.message = obj.status.health.message
              end
            end
          end
          return hs
        resource.customizations.ignoreDifferences.all: |
          jqPathExpressions:
            - .metadata.annotations."structurizr.com/checksum"
            - .metadata.labels."argocd.argoproj.io/instance"
        resource.customizations.ignoreDifferences.admissionregistration.k8s.io_MutatingWebhookConfiguration: |
          jqPathExpressions:
            - .webhooks[].clientConfig.caBundle
        resource.customizations.ignoreDifferences.apps_StatefulSet: |
          jqPathExpressions:
            - .spec.volumeClaimTemplates[].apiVersion
            - .spec.volumeClaimTemplates[].kind
        resource.customizations.ignoreDifferences.apiextensions.k8s.io_CustomResourceDefinition: |
          jqPathExpressions:
            - .metadata.labels
            - .spec.conversion
        resource.exclusions: |
          - apiGroups:
            - cilium.io
            kinds:
            - CiliumIdentity
            - CiliumEndpoint
            clusters:
            - "*"
          - apiGroups:
            - "*"
            kinds:
            - Event
  - target:
      kind: ConfigMap
      name: argocd-cmd-params-cm
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: argocd-cmd-params-cm
      data:
        server.insecure: "true"
