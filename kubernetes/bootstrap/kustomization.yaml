apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: argocd

resources:
  - namespace.yaml
  # Using the latest version as requested
  - https://raw.githubusercontent.com/argoproj/argo-cd/v3.4.1/manifests/install.yaml
  - root-application.yaml
  # Best Practice: NetworkPolicy fix for internal ArgoCD communication on Cilium/Talos
  - argocd-netpol-fix.yaml
  # Expose ArgoCD over Tailscale tailnet
  - argocd-ingress.yaml

# Enable Helm support for Kustomize globally in ArgoCD
patches:
  - target:
      kind: ConfigMap
      name: argocd-cm
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: argocd-cm
      data:
        kustomize.buildOptions: --enable-helm
        resource.exclusions: |
          - apiGroups:
            - cilium.io
            kinds:
            - CiliumIdentity
            - CiliumEndpoint
            clusters:
            - "*"
          - apiGroups:
            - "*"
            kinds:
            - Event
  - target:
      kind: ConfigMap
      name: argocd-cmd-params-cm
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: argocd-cmd-params-cm
      data:
        server.insecure: "true"
