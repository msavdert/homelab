apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-appsets
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/msavdert/homelab.git'
    targetRevision: HEAD
    path: kubernetes/argocd-apps
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
