apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - sc-db.yaml

helmCharts:
  - name: longhorn
    repo: https://charts.longhorn.io
    version: 1.7.2 # Using latest stable 1.7.x for production reliability
    releaseName: longhorn
    namespace: longhorn-system
    valuesFile: values.yaml
    includeCRDs: true
