apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - ingress.yaml
  - sc-db.yaml

helmCharts:
  - name: longhorn
    repo: https://charts.longhorn.io
    version: 1.9.2 # Sequential upgrade: 1.8 -> 1.9
    releaseName: longhorn
    namespace: longhorn-system
    valuesFile: values.yaml
    includeCRDs: true
