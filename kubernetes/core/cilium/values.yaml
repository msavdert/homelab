ipam:
  mode: kubernetes

kubeProxyReplacement: true

securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

k8sServiceHost: localhost
k8sServicePort: 7445

# Enable Hubble for observability
hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true

# Ingress Controller (Legacy)
ingressController:
  enabled: true
  loadbalancerMode: shared

# Modern Gateway API
gatewayAPI:
  enabled: true

# L2 Announcements (Required for LoadBalancer IPs on Bare Metal)
l2announcements:
  enabled: true

# Performance tuning for large clusters/CRDs
k8sClientRateLimit:
  qps: 50
  burst: 100
