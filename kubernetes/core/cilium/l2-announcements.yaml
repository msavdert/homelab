apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: main-pool
  namespace: kube-system
spec:
  blocks:
    - start: 10.0.0.200
      stop: 10.0.0.250
---
apiVersion: cilium.io/v2alpha1
kind: CiliumL2AnnouncementPolicy
metadata:
  name: main-policy
  namespace: kube-system
spec:
  # Announced via all interfaces by default. Adjust regex if needed.
  # interfaces:
  #   - ^eth[0-9]+$
  externalIPs: true
  loadBalancerIPs: true
