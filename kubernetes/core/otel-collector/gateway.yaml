apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel-gateway
  namespace: monitoring
spec:
  mode: deployment
  replicas: 1
  serviceAccount: otel-collector
  image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.113.0

  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 80
        spike_limit_percentage: 10

      batch:
        send_batch_size: 2048
        timeout: 10s

      resource:
        attributes:
          - key: cluster.name
            value: "talos-homelab"
            action: upsert
          - key: deployment.environment
            value: "homelab"
            action: upsert

    exporters:
      # Primary Metrics Storage
      prometheusremotewrite/victoriametrics:
        endpoint: "http://vmsingle-vm-shared:8428/api/v1/write"
        resource_to_telemetry_conversion:
          enabled: true
        external_labels:
          cluster: talos-homelab

      # Logging and Tracing (Loki/Tempo/ClickHouse to be added later)
      debug:
        verbosity: detailed

    service:
      pipelines:
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, resource, batch]
          exporters: [prometheusremotewrite/victoriametrics, debug]

  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi
