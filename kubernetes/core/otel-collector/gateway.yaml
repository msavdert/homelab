apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel-gateway
  namespace: monitoring
spec:
  mode: statefulset
  replicas: 1
  serviceAccount: otel-collector
  image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.152.0@sha256:f41d7995565df3733b7568702073a9c490792f9c6ac60684fe6a4da21a313f8d

  # Target Allocator for dynamic discovery on Gateway (Requires StatefulSet mode)
  targetAllocator:
    enabled: true
    image: ghcr.io/open-telemetry/opentelemetry-operator/target-allocator:v0.151.0@sha256:a34d608ea57c2e269b34b118a4791e14d3ad88df9c20786522efb6f231252269
    serviceAccount: otel-collector
    prometheusCR:
      enabled: true
      serviceMonitorSelector:
        matchLabels:
          app.kubernetes.io/name: kube-state-metrics
      podMonitorSelector:
        matchLabels:
          app.kubernetes.io/name: kube-state-metrics

  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

      # Gateway now handles dynamic scraping
      prometheus:
        config:
          scrape_configs:
            - job_name: 'otel-collector'
              scrape_interval: 20s
              static_configs:
                - targets: ['0.0.0.0:8888']
        target_allocator:
          endpoint: http://otel-gateway-targetallocator:80
          interval: 30s

    processors:
      memory_limiter:
        check_interval: 1s
        limit_percentage: 80
        spike_limit_percentage: 10

      batch:
        send_batch_size: 2048
        timeout: 10s

      resource:
        attributes:
          - key: cluster.name
            value: "talos-homelab"
            action: upsert
          - key: deployment.environment
            value: "homelab"
            action: upsert

    exporters:
      # Primary Metrics Storage
      prometheusremotewrite/victoriametrics:
        endpoint: "http://vmsingle-vm-shared:8428/api/v1/write"
        resource_to_telemetry_conversion:
          enabled: true
        external_labels:
          cluster: talos-homelab

      debug:
        verbosity: normal

    service:
      pipelines:
        metrics:
          receivers: [otlp, prometheus]
          processors: [memory_limiter, resource, batch]
          exporters: [prometheusremotewrite/victoriametrics]

  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi
