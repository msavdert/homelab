# Grafana Operator Configuration
# Using official OCI chart from ghcr.io/grafana/helm-charts/grafana-operator

# The operator is lightweight and manages Grafana CRDs.
# It doesn't need much customization at the operator level.
# Most config will be in the Grafana CRD later.

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi
