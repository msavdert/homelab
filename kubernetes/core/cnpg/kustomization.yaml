apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml

helmCharts:
  - name: cloudnative-pg
    repo: https://cloudnative-pg.github.io/charts
    version: 0.28.2 # Maps to operator v1.29.x
    releaseName: cloudnative-pg
    namespace: cnpg-system
    valuesFile: values.yaml
    includeCRDs: true
