apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: external-secrets

helmCharts:
  - name: external-secrets
    repo: https://charts.external-secrets.io
    version: 2.4.1 # Renovate bot will track this
    releaseName: external-secrets
    namespace: external-secrets
    valuesFile: values.yaml
    includeCRDs: true

resources:
  - namespace.yaml
  - infisical-cluster-store.yaml

# ESO 2.4.1 CRDs are large (>600KB), exceeding the 256KB limit of client-side apply.
# We force ServerSideApply on these CRDs to prevent sync failures.
patches:
  - patch: |
      apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      metadata:
        name: externalsecrets.external-secrets.io
      annotations:
        argocd.argoproj.io/sync-options: ServerSideApply=true
  - patch: |
      apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      metadata:
        name: clustersecretstores.external-secrets.io
      annotations:
        argocd.argoproj.io/sync-options: ServerSideApply=true
  - patch: |
      apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      metadata:
        name: secretstores.external-secrets.io
      annotations:
        argocd.argoproj.io/sync-options: ServerSideApply=true
  - patch: |
      apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      metadata:
        name: clusterexternalsecrets.external-secrets.io
      annotations:
        argocd.argoproj.io/sync-options: ServerSideApply=true
  - patch: |
      apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      metadata:
        name: pushsecrets.external-secrets.io
      annotations:
        argocd.argoproj.io/sync-options: ServerSideApply=true
  - patch: |
      apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      metadata:
        name: clusterpushsecrets.external-secrets.io
      annotations:
        argocd.argoproj.io/sync-options: ServerSideApply=true
