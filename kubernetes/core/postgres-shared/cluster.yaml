apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-shared
  namespace: postgres
spec:
  instances: 3

  # Using our database-optimized StorageClass
  storage:
    size: 20Gi
    storageClass: longhorn-db

  # Best Practice: Separate volume for Write-Ahead Log (WAL)
  walStorage:
    size: 10Gi
    storageClass: longhorn-db

  # High Availability: Ensure instances are on different nodes
  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname

  # Production Tuning
  postgresql:
    parameters:
      max_connections: "100"
      shared_buffers: "256MB"
      work_mem: "16MB"
      maintenance_work_mem: "128MB"
      random_page_cost: "1.1" # Optimized for SSD/NVMe (Longhorn on Proxmox)

  # Monitoring: Prepared but disabled until stack is ready
  monitoring:
    enablePodMonitor: false

  # Resource Management
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi

  # Automated Maintenance
  imageName: ghcr.io/cloudnative-pg/postgresql:16.4
  
  # Note: A superuser password secret will be automatically generated by the operator
  # and can be retrieved from 'postgres-shared-app' secret.
