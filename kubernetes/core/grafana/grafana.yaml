apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana-shared
  namespace: monitoring
  labels:
    dashboards: "grafana-shared"
spec:
  # Using custom admin credentials
  config:
    log:
      mode: "console"
      level: "info"
    # Important: Disable the default admin secret to use our own via env vars
    disableDefaultAdminSecret: true

  # Injecting credentials from our ESO Secret
  deployment:
    spec:
      template:
        spec:
          containers:
            - name: grafana
              env:
                - name: GF_SECURITY_ADMIN_USER
                  valueFrom:
                    secretKeyRef:
                      name: grafana-admin-credentials
                      key: admin-user
                - name: GF_SECURITY_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: grafana-admin-credentials
                      key: admin-password

  # Persistent storage via Longhorn
  persistentVolumeClaim:
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: 5Gi
      storageClassName: longhorn-db
