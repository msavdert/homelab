apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victoria-metrics-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
spec:
  project: default
  source:
    repoURL: https://victoriametrics.github.io/helm-charts/
    targetRevision: 0.77.0
    chart: victoria-metrics-k8s-stack
    helm:
      valuesObject:
        fullnameOverride: "vm"
        victoria-metrics-operator:
          enabled: true
          admissionWebhooks:
            enabled: true
            certManager:
              enabled: true
        vmcluster:
          enabled: true
          spec:
            retentionPeriod: "1"
            replicationFactor: 2
            vmstorage:
              replicaCount: 2
              storageDataPath: /vm-data
              storage:
                volumeClaimTemplate:
                  spec:
                    storageClassName: longhorn
                    resources:
                      requests:
                        storage: 20Gi
              securityContext:
                runAsUser: 1000
                runAsGroup: 1000
                fsGroup: 2000
            vmselect:
              replicaCount: 2
              securityContext:
                runAsUser: 1000
                runAsGroup: 1000
                fsGroup: 2000
            vminsert:
              replicaCount: 2
        vmagent:
          enabled: true
          spec:
            scrapeInterval: "30s"
            externalLabels:
              cluster: homelab
            extraArgs:
              opentelemetry.enabled: "true"
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
              fsGroup: 2000
        vmalert:
          enabled: true
        alertmanager:
          enabled: true
          spec:
            replicaCount: 1
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
              fsGroup: 2000
            storage:
              volumeClaimTemplate:
                spec:
                  storageClassName: longhorn
                  resources:
                    requests:
                      storage: 1Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: vm-victoria-metrics-operator-admission
      jqPathExpressions:
        - '.webhooks[]?.clientConfig.caBundle'
    - group: ""
      kind: Secret
      name: vm-victoria-metrics-operator-validation
      jsonPointers:
        - /data

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victoria-logs
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  project: default
  source:
    repoURL: https://victoriametrics.github.io/helm-charts/
    targetRevision: 0.12.4
    chart: victoria-logs-single
    helm:
      valuesObject:
        fullnameOverride: "vlogs"
        server:
          retentionPeriod: "1"
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 2000
          persistentVolume:
            enabled: true
            storageClass: longhorn
            size: 20Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true

---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: victoria-traces
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  project: default
  source:
    repoURL: https://victoriametrics.github.io/helm-charts/
    targetRevision: 0.0.7
    chart: victoria-traces-single
    helm:
      valuesObject:
        fullnameOverride: "vtraces"
        vtsingle:
          spec:
            retentionPeriod: "1"
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
              fsGroup: 2000
            storage:
              storageClassName: longhorn
              resources:
                requests:
                  storage: 10Gi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
