apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudnative-pg-cluster
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/msavdert/homelab.git
    targetRevision: main
    path: apps/base/cloudnative-pg
  destination:
    server: https://kubernetes.default.svc
    namespace: default # Or a specific app namespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
