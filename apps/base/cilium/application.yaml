apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cilium
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1" # CNI should start first
spec:
  project: default
  source:
    chart: cilium
    repoURL: https://helm.cilium.io
    targetRevision: 1.19.3
    helm:
      values: |
        ipam:
          mode: kubernetes
        kubeProxyReplacement: true
        securityContext:
          capabilities:
            ciliumAgent: "{CHOWN,KILL,NET_ADMIN,NET_RAW,IPC_LOCK,SYS_ADMIN,SYS_RESOURCE,DAC_OVERRIDE,FOWNER,SETGID,SETUID}"
            cleanCiliumState: "{NET_ADMIN,SYS_ADMIN,SYS_RESOURCE}"
        cgroup:
          autoMount:
            enabled: false
          hostRoot: /sys/fs/cgroup
        k8sServiceHost: localhost
        k8sServicePort: 7445
        l2announcements:
          enabled: true
        k8sClientRateLimit:
          qps: 50
          burst: 100
        ingressController:
          enabled: true
          loadbalancerMode: shared
        gatewayAPI:
          enabled: true
          enableAlpn: true
          enableAppProtocol: true
          gatewayClass:
            create: true
        egressGateway:
          enabled: true
        bpf:
          masquerade: true
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true # Critical for adopting existing resources
