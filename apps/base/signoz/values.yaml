# SigNoz Helm Chart Values optimized for Homelab
# Reference: https://github.com/SigNoz/charts/blob/main/charts/signoz/values.yaml

global:
  storageClass: longhorn

clickhouse:
  persistence:
    size: 20Gi
  layout:
    shardsCount: 1
    replicasCount: 1

zookeeper:
  persistence:
    size: 5Gi
  replicaCount: 1

queryService:
  persistence:
    size: 1Gi

otelCollector:
  replicaCount: 1

signoz:
  # Root User Bootstrap (GitOps)
  # Note: Requires a "SigNoz" item in 1Password 'homelab' vault with 'password' field.
  env:
    SIGNOZ_USER_ROOT_ENABLED: "true"
    SIGNOZ_USER_ROOT_EMAIL: "admin@savdert.com"
    SIGNOZ_USER_ROOT_ORG_NAME: "Savdert Homelab"
    SIGNOZ_USER_ROOT_PASSWORD:
      valueFrom:
        secretKeyRef:
          name: signoz-admin-credentials
          key: password

  ingress:
    enabled: true
    className: cilium
    annotations:
      ingress.cilium.io/loadbalancer-mode: shared
    hosts:
      - host: signoz.savdert.com
        paths:
          - path: /
            pathType: Prefix
            port: 8080
